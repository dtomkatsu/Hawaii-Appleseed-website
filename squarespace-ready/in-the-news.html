<style>
  .ha-news{max-width:1180px;margin:0 auto;padding:0 28px 80px;}
  @media (max-width:700px){ .ha-news{padding:0 20px 56px;} }
  .ha-news__hero{padding:36px 0 8px;}
  .ha-news__eyebrow{font-family:'Manrope',sans-serif;font-size:12px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#52796F;display:flex;align-items:center;gap:12px;}
  .ha-news__eyebrow::before{content:"";width:40px;height:1px;background:#84A98C;}
  .ha-news__title{font-family:'Manrope',sans-serif;font-weight:300;font-size:clamp(2.4rem,5vw,3.6rem);color:#2F3E46;margin:14px 0 10px;}
  .ha-news__lede{font-size:1.02rem;line-height:1.7;color:#52796F;max-width:60ch;margin:0;}
  .ha-news__toolbar{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;margin:30px 0 8px;}
  .ha-news__search{flex:1;min-width:220px;max-width:360px;padding:11px 16px;border:1px solid #CAD2C5;border-radius:4px;font-family:'Poppins',sans-serif;font-size:14px;color:#2F3E46;background:#fff;}
  .ha-news__search:focus{outline:2px solid #84A98C;outline-offset:1px;border-color:#84A98C;}
  .ha-news__filters{display:flex;flex-wrap:wrap;gap:8px;}
  .ha-news__pill{font-family:'Manrope',sans-serif;font-size:12.5px;font-weight:600;letter-spacing:.02em;padding:7px 14px;border:1px solid #CAD2C5;border-radius:999px;background:#fff;color:#354F52;cursor:pointer;transition:background .2s,color .2s,border-color .2s;}
  .ha-news__pill:hover{border-color:#84A98C;color:#52796F;}
  .ha-news__pill.is-active{background:#52796F;border-color:#52796F;color:#fff;}
  .ha-news__count{font-size:13px;color:#52796F;margin:14px 0 18px;}
  .ha-news__grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;}
  /* The whole card is a link (user request: "click anywhere in the box").
     Rendered as an <a>, so the inner "Read more" is a <span>, not a nested <a>. */
  .ha-news__card{display:flex;flex-direction:column;background:#fff;border:1px solid #E8EDE6;border-radius:6px;padding:22px 22px 20px;transition:border-color .25s,box-shadow .25s,transform .25s;text-decoration:none;color:inherit;cursor:pointer;}
  .ha-news__card:focus-visible{outline:2px solid #52796F;outline-offset:3px;}
  .ha-news__card:hover{border-color:#84A98C;box-shadow:0 10px 26px rgba(47,62,70,.08);transform:translateY(-2px);}
  .ha-news__src{display:flex;align-items:center;gap:8px;font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#52796F;margin-bottom:12px;}
  .ha-news__tag{background:#84A98C;color:#fff;border-radius:3px;padding:2px 7px;font-size:10px;letter-spacing:.1em;}
  .ha-news__card h3{font-family:'Manrope',sans-serif;font-weight:600;font-size:1.08rem;line-height:1.34;color:#2F3E46;margin:0 0 10px;}
  .ha-news__excerpt{font-size:.92rem;line-height:1.6;color:#52796F;margin:0 0 16px;flex:1;}
  .ha-news__meta{font-size:12px;color:#7d8f86;margin-bottom:14px;}
  .ha-news__link{font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:#52796F;text-decoration:none;display:inline-flex;align-items:center;gap:7px;margin-top:auto;}
  .ha-news__link:hover{color:#2F3E46;}
  .ha-news__link svg{width:13px;height:13px;}
  .ha-news__more-wrap{text-align:center;margin:36px 0 8px;}
  .ha-news__more{font-family:'Manrope',sans-serif;font-weight:600;font-size:14px;letter-spacing:.04em;color:#2F3E46;background:#fff;border:1px solid #354F52;border-radius:3px;padding:13px 30px;cursor:pointer;transition:background .2s,color .2s;}
  .ha-news__more:hover{background:#2F3E46;color:#fff;}
  .ha-news__more[hidden]{display:none;}
  .ha-news__synced{text-align:center;font-size:12px;color:#9aa89f;margin-top:22px;}
  .ha-news__empty{padding:40px 0;text-align:center;color:#52796F;}
  /* Sub-sections (Press Releases / Blog / In the News) on the Media hub */
  .ha-news__section{margin-top:56px;}
  .ha-news__section:first-of-type{margin-top:40px;}
  .ha-news__section[hidden]{display:none;}
  .ha-news__section-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;padding-bottom:14px;border-bottom:1px solid #E8EDE6;}
  .ha-news__section-title{font-family:'Manrope',sans-serif;font-weight:600;font-size:1.6rem;color:#2F3E46;margin:0;}
  .ha-news__viewall{font-family:'Manrope',sans-serif;font-size:13px;font-weight:600;color:#52796F;text-decoration:none;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .ha-news__viewall:hover{color:#2F3E46;}
  .ha-news__viewall svg{width:13px;height:13px;}
  .ha-news__date{color:#7d8f86;font-weight:600;}
</style>

    <h1 class="ha-news__title">News &amp; Media</h1>
    <p class="ha-news__lede">News coverage, blog posts, and press releases from Hawai&#699;i Appleseed's research and advocacy.</p>
  </header>

  <!-- In the News &#8212; the full, searchable press-mention archive. -->
  <section class="ha-news__section">
    <div class="ha-news__section-head">
      <h2 class="ha-news__section-title">In the News</h2>
      <a class="ha-news__viewall" href="https://hiappleseed.org/in-the-news" target="_blank" rel="noopener">View on hiappleseed.org <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M8 2l5 5-5 5"/></svg></a>

  <!-- From the Blog &#8212; searchable/filterable, same toolbar as In the News. -->
  <section class="ha-news__section" id="ha-blog-section" hidden>
    <div class="ha-news__section-head">
      <h2 class="ha-news__section-title">From the Blog</h2>
      <a class="ha-news__viewall" href="https://hiappleseed.org/blog" target="_blank" rel="noopener">View all posts <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M8 2l5 5-5 5"/></svg></a>
    </div>
    <div class="ha-news__toolbar">
      <input id="ha-blog-search" class="ha-news__search" type="search" placeholder="Search the blog&#8230;" autocomplete="off" aria-label="Search blog posts">
      <div class="ha-news__filters" id="ha-blog-filters" role="group" aria-label="Filter by topic"></div>
    </div>
    <p class="ha-news__count" id="ha-blog-count">&nbsp;</p>
    <div class="ha-news__grid" id="ha-blog-grid"></div>
    <div class="ha-news__more-wrap"><button id="ha-blog-more" class="ha-news__more" type="button" hidden>Load more</button></div>
  </section>

  <!-- Press Releases &#8212; searchable/filterable, same toolbar as the other two. -->
  <section class="ha-news__section" id="ha-pr-section" hidden>
    <div class="ha-news__section-head">
      <h2 class="ha-news__section-title">Press Releases</h2>
      <a class="ha-news__viewall" href="https://hiappleseed.org/press-releases" target="_blank" rel="noopener">View all press releases <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M8 2l5 5-5 5"/></svg></a>
    </div>
    <div class="ha-news__toolbar">
      <input id="ha-pr-search" class="ha-news__search" type="search" placeholder="Search press releases&#8230;" autocomplete="off" aria-label="Search press releases">
      <div class="ha-news__filters" id="ha-pr-filters" role="group" aria-label="Filter by topic"></div>
    </div>
    <p class="ha-news__count" id="ha-pr-count">&nbsp;</p>
    <div class="ha-news__grid" id="ha-pr-grid"></div>
    <div class="ha-news__more-wrap"><button id="ha-pr-more" class="ha-news__more" type="button" hidden>Load more</button></div>
  </section>

  <p class="ha-news__synced" id="ha-news-synced"></p>

<script>
(function(){
  var TOPICS=['Affordable Housing','Food Equity','Wages & Labor','Transportation Equity','Taxes & Budget'];
  var syncedEl=document.getElementById('ha-news-synced'),
      errFallbackGrid=document.getElementById('ha-news-grid');

  function strip(h){var d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim();}
  function fmtDate(ms){if(!ms)return '';var d=new Date(ms);return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  function card(p){
    var outlet=p.outlet||strip(p.author&&p.author.bio)||'Press';
    var url=p.sourceUrl||(p.fullUrl?'https://hiappleseed.org'+p.fullUrl:'#');
    var ex=strip(p.excerpt); if(ex.length>180) ex=ex.slice(0,177)+'\u2026';
    return '<a class="ha-news__card" href="'+url+'" target="_blank" rel="noopener">'+
      '<div class="ha-news__src"><span class="ha-news__tag">Press</span>'+esc(outlet)+'</div>'+
      '<h3>'+esc(strip(p.title))+'</h3>'+
      (ex?'<p class="ha-news__excerpt">'+esc(ex)+'</p>':'')+
      '<div class="ha-news__meta">'+fmtDate(p.publishOn)+'</div>'+
      '<span class="ha-news__link">Read on '+esc(outlet)+
        ' <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M8 2l5 5-5 5"/></svg></span>'+
      '</a>';
  }
  // Blog posts + press releases are internal Squarespace collection items:
  // they link to hiappleseed.org + fullUrl (no external sourceUrl).
  function postCard(p, tag){
    var url=p.fullUrl?'https://hiappleseed.org'+p.fullUrl:'#';
    var cat=(p.categories&&p.categories[0])||'';
    var ex=strip(p.excerpt); if(ex.length>170) ex=ex.slice(0,167)+'\u2026';
    return '<a class="ha-news__card" href="'+url+'" target="_blank" rel="noopener">'+
      '<div class="ha-news__src"><span class="ha-news__tag">'+esc(tag)+'</span>'+(cat?esc(cat):'<span class="ha-news__date">'+fmtDate(p.publishOn)+'</span>')+'</div>'+
      '<h3>'+esc(strip(p.title))+'</h3>'+
      (ex?'<p class="ha-news__excerpt">'+esc(ex)+'</p>':'')+
      '<div class="ha-news__meta">'+fmtDate(p.publishOn)+'</div>'+
      '<span class="ha-news__link">Read more'+
        ' <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 7h12M8 2l5 5-5 5"/></svg></span>'+
      '</a>';
  }

  // A full searchable/filterable feed (toolbar + pill filters + "Load
  // more" pagination) \u2014 powers both the In the News archive and the
  // Blog section with the same behavior, just different DOM ids /
  // card renderer / search fields.
  function makeFeed(opts){
    // Unexpanded state shows just INITIAL_PAGE; each "Load more" click
    // after that reveals a full PAGE at a time.
    var INITIAL_PAGE=6, PAGE=24, all=[], view=[], shown=0, topic=null, q='';
    var grid=document.getElementById(opts.gridId),
        countEl=document.getElementById(opts.countId),
        moreBtn=document.getElementById(opts.moreId),
        searchEl=document.getElementById(opts.searchId),
        filtersEl=document.getElementById(opts.filtersId),
        section=opts.sectionId?document.getElementById(opts.sectionId):null;

    function applyFilters(){
      view=all.filter(function(p){
        if(topic && !((p.categories||[]).indexOf(topic)>-1)) return false;
        if(q){var hay=opts.searchHay(p).toLowerCase(); if(hay.indexOf(q)<0) return false;}
        return true;
      });
      shown=0; grid.innerHTML=''; render();
    }
    function render(){
      var pageSize = shown===0 ? INITIAL_PAGE : PAGE;
      var next=view.slice(shown,shown+pageSize);
      grid.insertAdjacentHTML('beforeend', next.map(opts.card).join(''));
      shown+=next.length;
      moreBtn.hidden = shown>=view.length;
      countEl.textContent = view.length? (view.length+' '+(view.length>1?opts.nounPlural:opts.noun)+(topic?' \u00b7 '+topic:'')) : '';
      if(!view.length) grid.innerHTML='<p class="ha-news__empty">'+opts.emptyText+'</p>';
    }
    function buildFilters(){
      var mk=function(label,val){var b=document.createElement('button');b.className='ha-news__pill'+(val===topic?' is-active':'');b.textContent=label;b.onclick=function(){topic=val;[].forEach.call(filtersEl.children,function(c){c.classList.remove('is-active');});b.classList.add('is-active');applyFilters();};return b;};
      filtersEl.appendChild(mk('All',null));
      TOPICS.forEach(function(t){filtersEl.appendChild(mk(t,t));});
    }
    moreBtn.addEventListener('click',render);
    var t; searchEl.addEventListener('input',function(){clearTimeout(t);t=setTimeout(function(){q=searchEl.value.trim().toLowerCase();applyFilters();},200);});
    buildFilters();

    return {
      setData: function(items){
        all=(items||[]).slice().sort(function(a,b){return (b.publishOn||0)-(a.publishOn||0);});
        if(section) section.hidden = all.length===0;
        applyFilters();
      }
    };
  }

  var newsFeed = makeFeed({
    gridId:'ha-news-grid', countId:'ha-news-count', moreId:'ha-news-more',
    searchId:'ha-news-search', filtersId:'ha-news-filters',
    card:card, noun:'article', nounPlural:'articles',
    searchHay:function(p){return strip(p.title)+' '+(p.outlet||'')+' '+strip(p.excerpt);},
    emptyText:'No coverage matches your filters.'
  });
  var blogFeed = makeFeed({
    gridId:'ha-blog-grid', countId:'ha-blog-count', moreId:'ha-blog-more',
    searchId:'ha-blog-search', filtersId:'ha-blog-filters', sectionId:'ha-blog-section',
    card:function(p){return postCard(p,'Blog');}, noun:'post', nounPlural:'posts',
    searchHay:function(p){return strip(p.title)+' '+strip(p.excerpt);},
    emptyText:'No posts match your filters.'
  });
  // Press releases use the same five issue-area categories as the other feeds,
  // so they share TOPICS and the same search/filter/pagination behavior.
  var prFeed = makeFeed({
    gridId:'ha-pr-grid', countId:'ha-pr-count', moreId:'ha-pr-more',
    searchId:'ha-pr-search', filtersId:'ha-pr-filters', sectionId:'ha-pr-section',
    card:function(p){return postCard(p,'Press Release');}, noun:'press release', nounPlural:'press releases',
    searchHay:function(p){return strip(p.title)+' '+strip(p.excerpt);},
    emptyText:'No press releases match your filters.'
  });

  fetch('https://dtomkatsu.github.io/Hawaii-Appleseed-website/news.json').then(function(r){if(!r.ok)throw 0;return r.json();}).then(function(d){
    newsFeed.setData(d.press);
    blogFeed.setData(d.blog);
    prFeed.setData(d.press_releases);
    if(d.lastSynced) syncedEl.textContent='Last updated '+fmtDate(d.lastSynced);
  }).catch(function(){errFallbackGrid.innerHTML='<p class="ha-news__empty">Unable to load coverage right now. Visit <a href="https://hiappleseed.org/in-the-news" target="_blank" rel="noopener">hiappleseed.org/in-the-news</a>.</p>';});
})();
</script>
<style>
/* Squarespace-fit: fixed-position bars can't anchor to the viewport
   inside a code block. Hide the progress line; rebuild the pill/tab
   nav as a sticky overlay (see build_squarespace.py). */
.ha-progress { display: none !important; }
.ha-issues, .ha-tax, .ha-food, .ha-housing, .ha-transit, .ha-wages { overflow: clip !important; }
/* absolute at FIRST PAINT so the (invisible) bar contributes zero
   flow height from the very first frame \2014  the script below converts
   it to sticky + negative margin, which also nets to zero flow, so
   the conversion causes no layout shift. (When this was sticky from
   the start, the bar's 49-92px flow height was in the first paint
   and everything below it visibly snapped UP once the script's
   negative margin landed.) */
.ha-nav-bar, [class*="__stuck-bar"] {
  position: absolute !important; top: 0 !important;
  left: 0 !important; right: 0 !important;
}
</style>
<script>
(function(){
  // Convert absolute -> sticky overlay. Both states occupy zero net
  // flow space (absolute: out of flow; sticky: height cancelled by
  // the negative margin), and the switch happens inside one
  // synchronous pass \u2014 no paint can interleave \u2014 so there is no
  // layout shift at any point. ResizeObserver resyncs the margin
  // when the pills wrap at narrow widths.
  document.querySelectorAll('.ha-nav-bar, [class*="__stuck-bar"]').forEach(function(bar){
    var sync = function(){ bar.style.setProperty('margin-bottom', -bar.offsetHeight + 'px', 'important'); };
    bar.style.setProperty('position', 'sticky', 'important');
    bar.style.setProperty('top', '0', 'important');
    bar.style.setProperty('left', 'auto', 'important');
    bar.style.setProperty('right', 'auto', 'important');
    sync();
    if (window.ResizeObserver) new ResizeObserver(sync).observe(bar);
    window.addEventListener('resize', sync);
  });
})();
</script>

<style>
/* Squarespace-fit: counter the code block's mobile content-column
   padding by breaking the page wrapper out to 100vw. Mobile-only \2014 
   desktop already spans full width. */
@media (max-width:1080px){
  .ha-mission, .ha-story, .ha-issues, .ha-team, .ha-board,
  .ha-tax, .ha-food, .ha-housing, .ha-transit, .ha-wages,
  .ha-pub, .ha-news {
    width: 100vw !important;
    max-width: 100vw !important;
    margin-left: calc(50% - 50vw) !important;
    margin-right: calc(50% - 50vw) !important;
  }
}
</style>
