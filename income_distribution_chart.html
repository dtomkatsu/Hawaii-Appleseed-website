<!-- Income Distribution Pie Chart Snippet -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

.id-chart-wrapper {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background: transparent;
    color: #1a202c;
    position: relative;
}

.id-title {
    font-size: 1.25rem;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: left;
    font-style: italic;
    color: #000;
}

.id-chart-container {
    position: relative;
    width: 100%;
    height: 500px;
    display: flex;
    justify-content: center;
    align-items: center;
}

svg.id-pie-chart {
    width: 100%;
    height: 100%;
    max-width: 600px;
    max-height: 500px;
    overflow: visible;
}

path.id-slice {
    transition: transform 0.3s ease, filter 0.3s ease, fill 0.3s ease;
    cursor: pointer;
    transform-origin: center;
    stroke: #fff;
    stroke-width: 2px;
}

path.id-slice:hover {
    transform: scale(1.05);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    z-index: 10;
}

/* Label styling */
.id-label-group {
    pointer-events: none;
    opacity: 0; /* Hidden initially for animation */
    transition: opacity 0.5s ease 0.5s;
}

.id-label-group.visible {
    opacity: 1;
}

.id-label-line {
    stroke: #718096;
    stroke-width: 1px;
    fill: none;
}

.id-label-text {
    font-size: 14px;
    font-weight: 600;
    fill: #1a202c;
}

.id-label-percent {
    font-size: 12px;
    fill: #718096;
    font-weight: 500;
}

/* Tooltip */
.id-tooltip {
    position: absolute;
    background: rgba(36, 53, 81, 0.95);
    color: white;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 0.85rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    z-index: 100;
    white-space: nowrap;
}

/* Animations */
@keyframes dash {
    from {
        stroke-dasharray: 0 1000;
    }
    to {
        stroke-dasharray: 1000 1000; /* Approximate max path length */
    }
}

</style>

<div class="id-chart-wrapper">
    <!-- <div class="id-title">Figure 3. Income Distribution</div> -->
    
    <div class="id-chart-container">
        <svg class="id-pie-chart" viewBox="0 0 600 400">
            <g transform="translate(300, 200)">
                <!-- Slices will be injected here by JS -->
            </g>
            
            <!-- Labels Layer -->
            <g class="id-labels" transform="translate(300, 200)">
                <!-- Label 1: Smallest (1.7%) -->
                <g class="id-label-group" id="label-1">
                    <polyline points="5, -145 20, -155 180, -155" class="id-label-line"/>
                    <text x="180" y="-165" text-anchor="end" class="id-label-text">$152,000 - $345,000</text>
                    <text x="180" y="-145" text-anchor="end" class="id-label-percent">1.7%</text>
                    <circle cx="5" cy="-145" r="2" fill="#718096" />
                </g>

                <!-- Label 2: Medium (12.2%) -->
                <g class="id-label-group" id="label-2">
                    <polyline points="40, -130 60, -100 180, -100" class="id-label-line"/>
                    <text x="180" y="-110" text-anchor="end" class="id-label-text">$345,000 - $783,300</text>
                    <text x="180" y="-90" text-anchor="end" class="id-label-percent">12.2%</text>
                    <circle cx="40" cy="-130" r="2" fill="#718096" />
                </g>

                <!-- Label 3: Largest (86.1%) -->
                <g class="id-label-group" id="label-3">
                    <polyline points="-80, 100 -100, 160 -280, 160" class="id-label-line"/>
                    <text x="-280" y="150" text-anchor="start" class="id-label-text">$783,300+</text>
                    <text x="-280" y="175" text-anchor="start" class="id-label-percent">86.1%</text>
                    <circle cx="-80" cy="100" r="2" fill="#718096" />
                </g>
            </g>
        </svg>
        <div class="id-tooltip" id="id-tooltip"></div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const svgGroup = document.querySelector('.id-pie-chart g');
    const tooltip = document.getElementById('id-tooltip');
    
    // Data
    // Order: Small (top), Medium (right), Large (rest)
    // Angles: -90deg start
    const data = [
        { 
            value: 1.7, 
            color: '#718096',  // Grey/Slate for smallest
            label: '$152,000 - $345,000',
            textColor: '#718096'
        },
        { 
            value: 12.2, 
            color: '#3a5278', // Medium Blue
            label: '$345,000 - $783,300',
            textColor: '#3a5278'
        },
        { 
            value: 86.1, 
            color: '#243551', // Dark Brand Blue
            label: '$783,300+',
            textColor: '#243551'
        }
    ];

    let cumulativePercent = 0;

    function getCoordinatesForPercent(percent) {
        const x = Math.cos(2 * Math.PI * percent);
        const y = Math.sin(2 * Math.PI * percent);
        return [x, y];
    }

    // Radius
    const R = 150;

    data.forEach((slice, index) => {
        // Start and end percentages (0-1)
        // Offset by -0.25 to start at 12 o'clock
        const startPercent = cumulativePercent - 0.25;
        cumulativePercent += slice.value / 100;
        const endPercent = cumulativePercent - 0.25;

        const [startX, startY] = getCoordinatesForPercent(startPercent);
        const [endX, endY] = getCoordinatesForPercent(endPercent);

        const largeArcFlag = slice.value > 50 ? 1 : 0;

        const pathData = [
            `M 0 0`,
            `L ${startX * R} ${startY * R}`,
            `A ${R} ${R} 0 ${largeArcFlag} 1 ${endX * R} ${endY * R}`,
            `Z`
        ].join(' ');

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('fill', slice.color);
        path.setAttribute('class', 'id-slice');
        
        // Initial animation state
        path.style.transform = 'scale(0)';
        
        // Interaction
        path.addEventListener('mousemove', (e) => {
            const rect = svgGroup.getBoundingClientRect();
            tooltip.style.left = (e.clientX - rect.left + 300) + 'px'; // +300 for translate
            tooltip.style.top = (e.clientY - rect.top + 200 - 40) + 'px';
            tooltip.style.opacity = '1';
            tooltip.textContent = `${slice.label}: ${slice.value}%`;
            
            // Highlight text label
            document.getElementById(`label-${index+1}`).style.opacity = '1';
            document.getElementById(`label-${index+1}`).querySelector('.id-label-text').style.fill = slice.color;
        });

        path.addEventListener('mouseleave', () => {
            tooltip.style.opacity = '0';
             document.getElementById(`label-${index+1}`).querySelector('.id-label-text').style.fill = '#1a202c';
        });

        svgGroup.appendChild(path);
    });

    // Animate in when visible
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                // Animate slices
                document.querySelectorAll('.id-slice').forEach((path, index) => {
                    setTimeout(() => {
                        path.style.transform = 'scale(1)';
                    }, 100 + (index * 200));
                });
                
                // Show labels
                setTimeout(() => {
                    document.querySelectorAll('.id-label-group').forEach(el => el.classList.add('visible'));
                }, 1000);

                observer.disconnect();
            }
        });
    }, { threshold: 0.3 });

    observer.observe(document.querySelector('.id-chart-container'));
});
</script>
