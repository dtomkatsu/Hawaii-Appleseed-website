name: Sync content from hiappleseed.org

on:
  schedule:
    # Runs every day at 6 AM UTC (8 PM Hawaii time, so new posts from the day are captured)
    - cron: "0 6 * * *"
  workflow_dispatch: # allows manual trigger from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch publications from Squarespace
        run: python3 scripts/sync-publications.py

      - name: Fetch blog posts and press mentions from Squarespace
        run: python3 scripts/sync-news.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publications.json news.json
          if git diff --cached --quiet; then
            echo "No changes to publications.json or news.json — skipping commit"
          else
            git commit -m "sync: update content from hiappleseed.org"
            git push
          fi
