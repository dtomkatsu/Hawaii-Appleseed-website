<!-- Bill Tracker Component -->
<style>
.tfc-bill-tracker {
    background: #f8fafc;
    border: 1px solid rgba(36, 53, 81, 0.12);
    border-top: none;
    border-radius: 0 0 16px 16px;
    padding: 20px;
    margin-top: -16px; /* Overlap with card above to look attached */
    padding-top: 32px; /* Extra padding to account for overlap */
    position: relative;
    z-index: 1; /* Below the main card */
    font-family: 'Inter', sans-serif;
    max-width: 100%;
}

.tfc-bill-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
}

.tfc-bill-col h4 {
    font-size: 0.75rem;
    font-weight: 600;
    color: #718096;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin: 0 0 8px 0;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 4px;
}

.tfc-bill-number {
    font-size: 1.1rem;
    font-weight: 700;
    color: #243551;
}

.tfc-status-section {
    border-top: 1px solid #e2e8f0;
    padding-top: 16px;
}

.tfc-status-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    user-select: none;
}

.tfc-status-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #4a5568;
}

.tfc-status-toggle {
    font-size: 0.8rem;
    color: #3a5278;
    display: flex;
    align-items: center;
    gap: 4px;
}

.tfc-status-toggle::after {
    content: '▼';
    font-size: 0.6rem;
    transition: transform 0.3s ease;
}

.tfc-status-section.expanded .tfc-status-toggle::after {
    transform: rotate(180deg);
}

.tfc-latest-update {
    margin-top: 12px;
    padding: 12px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.9rem;
    color: #2d3748;
    position: relative;
}

.tfc-status-date {
    display: block;
    font-size: 0.75rem;
    color: #718096;
    margin-bottom: 4px;
    font-weight: 500;
}

.tfc-status-history {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease-out;
    margin-top: 0;
}

.tfc-status-section.expanded .tfc-status-history {
    max-height: 500px; /* Arbitrary large height */
    margin-top: 12px;
    overflow-y: auto;
}

.tfc-history-item {
    padding: 12px;
    border-left: 2px solid #cbd5e0;
    margin-left: 8px;
    position: relative;
    font-size: 0.85rem;
    color: #4a5568;
    padding-bottom: 16px;
}

.tfc-history-item::before {
    content: '';
    position: absolute;
    left: -6px;
    top: 16px;
    width: 10px;
    height: 10px;
    background: #fff;
    border: 2px solid #cbd5e0;
    border-radius: 50%;
}

.tfc-history-item:last-child {
    border-left-color: transparent;
}

/* Status Badge */
.tfc-status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 0.7rem;
    font-weight: 600;
    background: #ebf8ff;
    color: #2b6cb0;
    margin-left: 8px;
}
</style>

<div class="tfc-bill-tracker">
    <div class="tfc-bill-columns">
        <div class="tfc-bill-col">
            <h4>House Bill</h4>
            <div class="tfc-bill-number">HB <span id="hb-number">--</span></div>
        </div>
        <div class="tfc-bill-col">
            <h4>Senate Bill</h4>
            <div class="tfc-bill-number">SB <span id="sb-number">--</span></div>
        </div>
    </div>

    <div class="tfc-status-section" id="status-container">
        <div class="tfc-status-header" onclick="toggleHistory(this)">
            <span class="tfc-status-title">Latest Status <span class="tfc-status-badge" id="latest-badge">Loading...</span></span>
            <span class="tfc-status-toggle">History</span>
        </div>
        
        <!-- Latest Update -->
        <div class="tfc-latest-update" id="latest-update">
            Loading status feed...
        </div>

        <!-- History (Hidden by default) -->
        <div class="tfc-status-history" id="status-history">
            <!-- History items will be injected here -->
        </div>
    </div>
</div>

<script>
// Mock RSS data parser for demonstration
function parseRSS(xmlText) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlText, "text/xml");
    const items = xmlDoc.getElementsByTagName("item");
    const updates = [];

    for (let i = 0; i < items.length; i++) {
        const title = items[i].getElementsByTagName("title")[0].textContent;
        const pubDate = items[i].getElementsByTagName("pubDate")[0].textContent;
        
        // Extract useful parts from title (e.g., "3/6/25 HB476: Passed First Reading." -> "Passed First Reading.")
        // Pattern seems to be: Date BillNumber: Description
        let cleanDesc = title;
        const parts = title.split(': ');
        if (parts.length > 1) {
            cleanDesc = parts.slice(1).join(': ');
        }

        updates.push({
            description: cleanDesc,
            date: new Date(pubDate).toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            }),
            rawDate: new Date(pubDate)
        });
    }
    return updates;
}

function updateTracker(xmlText) {
    const updates = parseRSS(xmlText);
    
    if (updates.length > 0) {
        const latest = updates[0];
        
        // Update Latest Section
        const latestEl = document.getElementById('latest-update');
        latestEl.innerHTML = `
            <span class="tfc-status-date">${latest.date}</span>
            ${latest.description}
        `;
        
        // Update Badge
        // Simple heuristic: check keywords in description
        let badgeText = "Update";
        if (latest.description.toLowerCase().includes("passed")) badgeText = "Passed";
        if (latest.description.toLowerCase().includes("referred")) badgeText = "Referred";
        if (latest.description.toLowerCase().includes("hearing")) badgeText = "Hearing Scheduled";
        if (latest.description.toLowerCase().includes("deferred")) badgeText = "Deferred";
        
        document.getElementById('latest-badge').textContent = badgeText;

        // Update History
        const historyContainer = document.getElementById('status-history');
        historyContainer.innerHTML = ''; // Clear previous
        
        // Skip first item (latest)
        for (let i = 1; i < updates.length; i++) {
            const update = updates[i];
            const div = document.createElement('div');
            div.className = 'tfc-history-item';
            div.innerHTML = `
                <span class="tfc-status-date">${update.date}</span>
                ${update.description}
            `;
            historyContainer.appendChild(div);
        }

        // Try to extract bill number from first item title for display
        // Assuming title format "Date BillNum: ..."
        // This relies on the XML structure provided
        // For the sample XML: "12/8/25 HB476: Carried over..."
        // We can just set a placeholder or parameterize this function
        document.getElementById('hb-number').textContent = "476"; 
    }
}

function toggleHistory(header) {
    header.parentElement.classList.toggle('expanded');
}

// Sample XML Data (Injected for demo)
const sampleXML = `

</script>
