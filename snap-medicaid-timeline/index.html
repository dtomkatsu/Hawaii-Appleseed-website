            { source:'usda', date: '2026-10-01', title: 'SNAP Monthly Allotment Decrease', desc: 'A USDA re-evaluation of the Thrifty Food Plan — the federal formula that sets benefit levels nationwide — lowers monthly SNAP benefits for Hawaiʻi households, phasing down each October 1 (2026, 2027, and 2028).', moreContent: 'On average, benefits fall about $8 per person per month. A single-person household sees roughly $11 less, while a family of four sees about $34 less.', secondCard: '<div style="text-align:center;"><h3 style="color:white;font-size:1.2rem;margin-bottom:4px;">Maximum Monthly Allotment</h3><div style="color:rgba(255,255,255,0.8);font-size:0.8rem;margin-bottom:18px;">Family of four in Hawaiʻi</div><div style="display:flex;align-items:flex-end;justify-content:center;gap:6px;"><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,794</div><div style="width:100%;max-width:34px;height:135px;background:rgba(255,255,255,0.32);border:1px solid rgba(255,255,255,0.55);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY23</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,759</div><div style="width:100%;max-width:34px;height:132px;background:rgba(255,255,255,0.30);border:1px solid rgba(255,255,255,0.5);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY24</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,723</div><div style="width:100%;max-width:34px;height:129px;background:rgba(255,255,255,0.30);border:1px solid rgba(255,255,255,0.5);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY25</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,689</div><div style="width:100%;max-width:34px;height:127px;background:rgba(255,255,255,0.30);border:1px solid rgba(255,255,255,0.5);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY26</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,655</div><div style="width:100%;max-width:34px;height:124px;background:rgba(255,255,255,0.30);border:1px solid rgba(255,255,255,0.5);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY27*</div></div><div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-end;flex:1;"><div style="color:white;font-weight:800;font-size:0.7rem;margin-bottom:4px;">$1,622</div><div style="width:100%;max-width:34px;height:122px;background:rgba(255,255,255,0.30);border:1px solid rgba(255,255,255,0.5);border-radius:4px 4px 0 0;"></div><div style="color:rgba(255,255,255,0.75);font-size:0.6rem;margin-top:6px;">FFY28*</div></div></div><div style="color:rgba(255,255,255,0.7);font-size:0.66rem;margin-top:14px;">Source: Hawaiʻi DHS · *projected</div></div>' }, { source:'state', date: '2027-04-01', title: 'SNAP Sugary Soda Restrictions', desc: 'Hawaiʻi submitted a waiver request to the USDA restricting SNAP purchases of soft drinks. The restrictions would apply to all SNAP participants at SNAP-authorized retailers statewide — with no feasibility study, pilot project, or phased implementation before full rollout.', moreContent: 'Definition: a "soft drink" is any nonalcoholic beverage made with carbonated water and sweetened with more than 10 grams of sugar per serving. It does not include any beverage that contains milk, milk products, soy, rice, or other milk substitutes, or that is more than 50% vegetable or fruit juice by volume.', secondCard: '<div><h3 style="color:white;font-size:1.15rem;text-align:center;margin-bottom:14px;">What SNAP could buy under the waiver</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:stretch;"><div style="background:rgba(0,0,0,0.18);border-radius:8px 8px 0 0;padding:9px 10px;display:flex;align-items:center;gap:7px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(214,109,46,0.95);flex-shrink:0;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></span><span style="color:white;font-weight:800;font-size:0.78rem;line-height:1.15;">Not eligible</span></div><div style="background:rgba(0,0,0,0.18);border-radius:8px 8px 0 0;padding:9px 10px;display:flex;align-items:center;gap:7px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:rgba(46,116,168,0.95);flex-shrink:0;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span style="color:white;font-weight:800;font-size:0.78rem;line-height:1.15;">Still eligible</span></div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Sparkling lemonade</div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Noncarbonated lemonade or powdered lemonade mix</div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Regular soda</div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Sweetened teas, coffees, diet and lower-sugar sodas (e.g., prebiotic sodas), and sports drinks</div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Carbonated juice drinks with less than 50% juice (e.g., sparkling juice cocktail)</div><div style="background:rgba(255,255,255,0.12);padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Carbonated juice drinks with at least 50% juice (e.g., sparkling apple cider) and noncarbonated juice drinks (e.g., cranberry juice cocktail)</div><div style="background:rgba(255,255,255,0.12);border-radius:0 0 8px 8px;padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Carbonated energy drinks</div><div style="background:rgba(255,255,255,0.12);border-radius:0 0 8px 8px;padding:9px 10px;color:rgba(255,255,255,0.92);font-size:0.72rem;line-height:1.3;">Noncarbonated energy drinks</div></div><div style="color:rgba(255,255,255,0.7);font-size:0.66rem;margin-top:12px;text-align:center;">Source: FRAC</div></div>' }, { source:'hr1', date: '2027-10-01', title: 'State Cost-Share Begins', desc: 'For the first time, Hawai\u02BBi must pay for a share of SNAP benefits, depending on the state\u2019s payment error rate.', secondCard: '<div style="text-align:center;margin-top:30px;"><h3 style="color:white;margin-bottom:16px;font-size:1.65rem;">Cost for Hawai\u02BBi by Error Rate</h3><div style="display:flex;flex-direction:column;gap:10px;"><div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="color:rgba(255,255,255,0.8);font-size:0.85rem;">6\u20138%</span><span style="color:white;font-weight:800;font-size:1.05rem;">$34.7M</span></div><div style="width:100%;height:20px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;"><div style="width:25%;height:100%;background:rgba(255,255,255,0.4);"></div></div></div><div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="color:rgba(255,255,255,0.8);font-size:0.85rem;">8\u201310%</span><span style="color:white;font-weight:800;font-size:1.05rem;">$69.5M</span></div><div style="width:100%;height:20px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;"><div style="width:50%;height:100%;background:rgba(255,255,255,0.5);"></div></div></div><div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;"><span style="color:rgba(255,255,255,0.8);font-size:0.85rem;">10%+</span><span style="color:white;font-weight:800;font-size:1.05rem;">$139M</span></div><div style="width:100%;height:20px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;"><div style="width:100%;height:100%;background:rgba(255,255,255,0.6);"></div></div></div></div></div>' },
        ];

        let itemElements = [];
        let activeTimeline = 'medicaid';

        function formatDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${months[parseInt(m) - 1]} ${parseInt(d)}, ${y}`;
        }
        
        function formatShortDate(dateStr) {
            const [y, m, d] = dateStr.split('-');
            return `${parseInt(m)}/${y.slice(2)}`;
        }

        function buildSectionsHTML(sections, isSnap) {
            const accentVar = isSnap ? 'var(--accent-snap)' : 'var(--accent)';
            let html = '';
            sections.forEach(s => {
                html += `<div style="margin-top:16px;"><strong style="color:${accentVar};font-size:1rem;">${s.heading}</strong>`;
                if (s.before && s.after) {
                    html += `<button class="more-toggle" onclick="toggleMore(this)">More</button>`;
                    html += `<div class="more-content"><div class="more-content-inner">`;
                    html += `<div class="before-after-container">`;
                    html += `<div class="before-section"><span class="section-label">Before</span><p>${s.before}</p></div>`;
                    html += `<div class="split-divider"><span class="arrow">\u25BC</span></div>`;
                    html += `<div class="after-section"><span class="section-label">After</span><p>${s.after}</p></div>`;
                    html += `</div>`;
                    html += `</div></div>`;
                } else if (s.note) {
                    html += `<p style="margin-top:8px;color:#555;line-height:1.6;">${s.note}</p>`;
                }
                html += `</div>`;
            });
            return html;
        }

        function updateScrollProgress() {
            const scrollTop = window.pageYOffset;
            const allDates = getAllDates();
            
            let activeIndex = 0;
            let currentYear = allDates.length > 0 ? allDates[0].split('-')[0] : '2025';
            
            itemElements.forEach((el, i) => {
                const rect = el.getBoundingClientRect();
                const itemTop = rect.top + scrollTop;
                const itemMiddle = itemTop + rect.height / 2;
                
                if (scrollTop + window.innerHeight / 2 >= itemMiddle) {
                    activeIndex = i;
                    if (allDates[i]) {
                        currentYear = allDates[i].split('-')[0];
                    }
                }
            });
            
            miniDotElements.forEach(({ medDot, snapDot }, i) => {
                if (i === activeIndex) {
                    medDot.classList.add('active');
                    snapDot.classList.add('active');
                } else {
                    medDot.classList.remove('active');
                    snapDot.classList.remove('active');
                }
            });
            
            const yearIndicator = document.getElementById('year-indicator');
            if (yearIndicator.textContent !== currentYear) {
                yearIndicator.style.opacity = '0';
                setTimeout(() => {
                    yearIndicator.textContent = currentYear;
                    yearIndicator.style.opacity = '1';
                }, 250);
            }
            
            if (itemElements.length > 0) {
                const lineContainer = document.querySelector('.timeline-line-container');
                const lineRect = lineContainer.getBoundingClientRect();
                const lineTop = lineRect.top + scrollTop;
                const lineHeight = lineRect.height;
                
                const viewportMiddle = scrollTop + window.innerHeight * 0.35;

                // Medicaid progress: colored line always visible up to first dot, then grows with scroll
                const firstMedDot = document.querySelector('.timeline-dot');
                const medProgress = document.getElementById('timeline-progress');
                if (firstMedDot) {
                    const dotRect = firstMedDot.getBoundingClientRect();
                    const dotCenter = dotRect.top + scrollTop + dotRect.height / 2;
                    const minProgressPx = dotCenter - lineTop;
                    const scrollProgressPx = viewportMiddle - lineTop;
                    const progressPx = Math.max(minProgressPx, Math.min(lineHeight, scrollProgressPx));
                    medProgress.style.top = '0';
                    medProgress.style.height = (progressPx / lineHeight) * 100 + '%';
                }

                // SNAP progress: colored line always visible up to first SNAP dot, then grows with scroll
                const firstSnapDot = document.querySelector('.snap-timeline-dot');
                const snapProgress = document.getElementById('snap-parallel-progress');
                if (firstSnapDot) {
                    const snapDotRect = firstSnapDot.getBoundingClientRect();
                    const snapDotCenter = snapDotRect.top + scrollTop + snapDotRect.height / 2;
                    const snapLineContainer = document.querySelector('.snap-parallel-line');
                    const snapLineRect = snapLineContainer.getBoundingClientRect();
                    const snapLineTop = snapLineRect.top + scrollTop;
                    const snapLineHeight = snapLineRect.height;
                    const snapMinProgressPx = snapDotCenter - snapLineTop;
                    const snapScrollProgressPx = viewportMiddle - snapLineTop;
                    const snapProgressPx = Math.max(snapMinProgressPx, Math.min(snapLineHeight, snapScrollProgressPx));
                    snapProgress.style.top = '0';
                    snapProgress.style.height = (snapProgressPx / snapLineHeight) * 100 + '%';
                }
                
                itemElements.forEach((el, i) => {
                    const rect = el.getBoundingClientRect();
                    const elTop = rect.top + scrollTop;
                    
                    // Medicaid dot
                    const dot = el.querySelector('.timeline-dot');
                    if (dot) {
                        const dotRect = dot.getBoundingClientRect();
                        const dotCenter = dotRect.top + scrollTop + dotRect.height / 2;
                        
                        if (viewportMiddle >= dotCenter) {
                            dot.classList.add('passed');
                        } else {
                            dot.classList.remove('passed');
                        }
                        const distanceFromLine = Math.abs(viewportMiddle - dotCenter);
                        if (distanceFromLine < 150) {
                            dot.classList.add('active');
                        } else {
                            dot.classList.remove('active');
                        }
                    }

                    // SNAP dot
                    const snapDot = el.querySelector('.snap-timeline-dot');
                    if (snapDot) {
                        const snapDotRect = snapDot.getBoundingClientRect();
                        const snapDotCenter = snapDotRect.top + scrollTop + snapDotRect.height / 2;
                        
                        if (viewportMiddle >= snapDotCenter) {
                            snapDot.classList.add('passed');
                        } else {
                            snapDot.classList.remove('passed');
                        }
                        const distanceFromLine = Math.abs(viewportMiddle - snapDotCenter);
                        if (distanceFromLine < 150) {
                            snapDot.classList.add('active');
                        } else {
                            snapDot.classList.remove('active');
                        }
                    }
                    
                    const cards = el.querySelectorAll('.timeline-card');
                    cards.forEach(card => {
                        if (rect.top < window.innerHeight * 0.85 && rect.bottom > 0) {
                            card.classList.add('visible');
                        }
                    });
                });
            }
        }

        function scrollToItem(index) {
            if (itemElements[index]) {
                const rect = itemElements[index].getBoundingClientRect();
                const scrollTop = window.pageYOffset;
                const itemTop = rect.top + scrollTop;
                const itemMiddle = itemTop + rect.height / 2;
                const targetScroll = itemMiddle - window.innerHeight / 2;
                
                window.scrollTo({
                    top: targetScroll,
                    behavior: 'smooth'
                });
            }
        }

        function toggleMore(btn) {
            const content = btn.nextElementSibling;
            content.classList.toggle('open');
            btn.textContent = content.classList.contains('open') ? 'Less' : 'More';
        }

        function setActiveTimeline(timeline) {
            activeTimeline = timeline;
            const container = document.getElementById('timeline-container');
            const wrapper = document.getElementById('snap-medicaid-timeline');
            
            if (timeline === 'snap') {
                container.classList.add('snap-active');
                wrapper.classList.add('snap-active');
            } else {
                container.classList.remove('snap-active');
                wrapper.classList.remove('snap-active');
            }
            
            document.getElementById('btn-medicaid').classList.toggle('active', timeline === 'medicaid');
            document.getElementById('btn-snap').classList.toggle('active', timeline === 'snap');
            
            updateScrollProgress();
        }

        function sourceBadge(source) {
            if (!source) return '';
            const map = { hr1: 'HR1 / OBBBA', usda: 'USDA · Thrifty Food Plan', state: 'State waiver' };
            return ` <span class="source-tag source-${source}">${map[source] || source}</span>`;
        }

        function buildSnapCardHTML(snapItem) {
            let html = `<span class="date">${formatDate(snapItem.date)}</span>${sourceBadge(snapItem.source)}<h3>${snapItem.title}</h3>`;
            if (snapItem.sections) {
                html += buildSectionsHTML(snapItem.sections, true);
            } else if (snapItem.desc) {
                html += `<p>${snapItem.desc}</p>`;
            }
            if (snapItem.moreContent) {
                html += `<button class="more-toggle" onclick="toggleMore(this)">More</button>`;
                html += `<div class="more-content"><div class="more-content-inner"><p>${snapItem.moreContent}</p></div></div>`;
            }
            return html;
        }

        function getAllDates() {
            const dateSet = new Set();
            medicaidData.forEach(d => dateSet.add(d.date));
            snapData.forEach(d => dateSet.add(d.date));
            return Array.from(dateSet).sort();
        }

        function computeMargins(allDates) {
            // Convert dates to timestamps, compute proportional spacing
            const timestamps = allDates.map(d => new Date(d).getTime());
            const minGap = 60; // minimum px between items
            const maxGap = 200; // maximum px between items
            const margins = [];
            for (let i = 0; i < timestamps.length - 1; i++) {
                const diffDays = (timestamps[i + 1] - timestamps[i]) / (1000 * 60 * 60 * 24);
                // Scale: 30 days = minGap, 365+ days = maxGap
                const scaled = minGap + (maxGap - minGap) * Math.min(1, diffDays / 365);
                margins.push(Math.round(scaled));
            }
            margins.push(0); // last item
            return margins;
        }

        let miniDotElements = [];

        function renderItems() {
            const container = document.getElementById('timeline-items');
            const miniDotsMed = document.getElementById('mini-dots-med');
            const miniDotsSnap = document.getElementById('mini-dots-snap');
            
            container.innerHTML = '';
            miniDotsMed.innerHTML = '';
            miniDotsSnap.innerHTML = '';
            itemElements = [];
            miniDotElements = [];

            const allDates = getAllDates();
            const margins = computeMargins(allDates);

            allDates.forEach((date, i) => {
                const medItem = medicaidData.find(m => m.date === date);
                const snapItems = snapData.filter(s => s.date === date);
                const label = formatShortDate(date);

                // Medicaid mini dot (red circle) — one per date in the med group
                const medDot = document.createElement('div');
                medDot.className = 'mini-dot';
                medDot.dataset.date = label;
                medDot.onclick = () => scrollToItem(i);
                const medCircle = document.createElement('div');
                medCircle.className = 'mini-dot-med';
                if (!medItem) medCircle.style.opacity = '0.15';
                medDot.appendChild(medCircle);
                miniDotsMed.appendChild(medDot);

                // SNAP mini dot (green square) — one per date in the snap group
                const snapDot = document.createElement('div');
                snapDot.className = 'mini-dot';
                snapDot.dataset.date = label;
                snapDot.onclick = () => scrollToItem(i);
                const snapSquare = document.createElement('div');
                snapSquare.className = 'mini-dot-snap';
                if (!snapItems.length) snapSquare.style.opacity = '0.15';
                snapDot.appendChild(snapSquare);
                miniDotsSnap.appendChild(snapDot);

                // Store both so we can update them by index
                miniDotElements.push({ medDot, snapDot });

                // Timeline Item
                const itemDiv = document.createElement('div');
                let itemClass = 'timeline-item';
                if (medItem && !snapItems.length) itemClass += ' medicaid-only';
                if (snapItems.length && !medItem) itemClass += ' snap-only';
                itemDiv.className = itemClass;
                itemDiv.style.marginBottom = margins[i] + 'px';
                
                // === Medicaid Card ===
                if (medItem) {
                    const medGroup = document.createElement('div');
                    medGroup.style.position = 'relative';
                    medGroup.style.width = '100%';
                    if (snapItems.length) {
                        medGroup.classList.add('shared-date-med');
                    }

                    // Medicaid Dot
                    const dot = document.createElement('div');
                    dot.className = 'timeline-dot';
                    dot.style.top = '50px'; // Align with the left card title
                    dot.onclick = () => scrollToItem(i);
                    medGroup.appendChild(dot);

                    const card = document.createElement('div');
                    card.className = 'timeline-card medicaid-card';
                    
                    let cardHTML = `<span class="date">${formatDate(medItem.date)}</span>${sourceBadge(medItem.source)}<h3>${medItem.title}</h3>`;
                    
                    if (medItem.sections) {
                        cardHTML += buildSectionsHTML(medItem.sections);
                    } else if (medItem.desc) {
                        cardHTML += `<p>${medItem.desc}</p>`;
                    }
                    
                    if (medItem.moreContent) {
                        cardHTML += `<button class="more-toggle" onclick="toggleMore(this)">More</button>`;
                        cardHTML += `<div class="more-content"><div class="more-content-inner"><p>${medItem.moreContent}</p></div></div>`;
                    }
                    
                    card.innerHTML = cardHTML;
                    medGroup.appendChild(card);
                    
                    // Medicaid Second Card (+ optional Third Card)
                    if (medItem.secondCard && medItem.thirdCard) {
                        // Wrap both in a stacked container
                        const stack = document.createElement('div');
                        stack.className = 'stacked-cards';

                        const secondCard = document.createElement('div');
                        secondCard.className = 'timeline-card second-card medicaid-card';
                        secondCard.innerHTML = medItem.secondCard;
                        stack.appendChild(secondCard);

                        const thirdCard = document.createElement('div');
                        thirdCard.className = 'timeline-card second-card medicaid-card';
                        thirdCard.innerHTML = medItem.thirdCard;
                        stack.appendChild(thirdCard);

                        medGroup.appendChild(stack);
                    } else if (medItem.secondCard) {
                        const secondCard = document.createElement('div');
                        secondCard.className = 'timeline-card second-card medicaid-card';
                        secondCard.innerHTML = medItem.secondCard;
                        medGroup.appendChild(secondCard);
                    }

                    itemDiv.appendChild(medGroup);
                }
                
                // === SNAP Card(s) — one or more events can share a date ===
                snapItems.forEach((snapItem, si) => {
                    const snapGroup = document.createElement('div');
                    snapGroup.style.position = 'relative';
                    snapGroup.style.width = '100%';
                    if (medItem) {
                        snapGroup.classList.add('shared-date-snap');
                    }
                    // Separate stacked SNAP cards that share a date
                    if (si > 0) snapGroup.style.marginTop = '28px';

                    // SNAP Dot — only the first card at this date gets the dot;
                    // append to itemDiv when shared date so it aligns with Medicaid dot
                    if (si === 0) {
                        const snapDot = document.createElement('div');
                        snapDot.className = 'snap-timeline-dot';
                        snapDot.style.top = '50px';
                        snapDot.onclick = () => {
                            setActiveTimeline('snap');
                            scrollToItem(i);
                        };
                        if (medItem) {
                            itemDiv.appendChild(snapDot);
                        } else {
                            snapGroup.appendChild(snapDot);
                        }
                    }

                    const snapCard = document.createElement('div');
                    snapCard.className = 'timeline-card snap-card';
                    snapCard.innerHTML = buildSnapCardHTML(snapItem);
                    snapGroup.appendChild(snapCard);

                    // SNAP Second Card (+ optional Third Card)
                    if (snapItem.secondCard && snapItem.thirdCard) {
                        // Wrap both in a stacked container
                        const stack = document.createElement('div');
                        stack.className = 'stacked-cards';

                        const snapSecond = document.createElement('div');
                        snapSecond.className = 'timeline-card second-card snap-card';
                        snapSecond.innerHTML = snapItem.secondCard;
                        stack.appendChild(snapSecond);

                        const snapThird = document.createElement('div');
                        snapThird.className = 'timeline-card second-card snap-card';
                        snapThird.innerHTML = snapItem.thirdCard;
                        stack.appendChild(snapThird);

                        snapGroup.appendChild(stack);
                    } else if (snapItem.secondCard) {
                        const snapSecond = document.createElement('div');
                        snapSecond.className = 'timeline-card second-card snap-card';
                        snapSecond.innerHTML = snapItem.secondCard;
                        snapGroup.appendChild(snapSecond);
                        snapGroup.style.minHeight = '350px';
                    }

                    itemDiv.appendChild(snapGroup);
                });

                container.appendChild(itemDiv);
                itemElements.push(itemDiv);
            });

            setTimeout(updateScrollProgress, 100);
        }

        // Initialize
        document.getElementById('btn-medicaid').onclick = () => setActiveTimeline('medicaid');
        document.getElementById('btn-snap').onclick = () => setActiveTimeline('snap');
        document.getElementById('snap-parallel-line').onclick = () => setActiveTimeline('snap');
        document.getElementById('medicaid-line').onclick = () => setActiveTimeline('medicaid');
        
        window.addEventListener('scroll', updateScrollProgress);
        window.addEventListener('resize', () => renderItems());
        
        window.onload = () => {
            setActiveTimeline('medicaid');
            renderItems();
        };

    </script>
</div>
</body>
</html>
