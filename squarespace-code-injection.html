<!-- =====================================================================
     Site-wide Code Injection for hiappleseed.org (Squarespace 7.1).
     Location: Settings > Advanced > Code Injection > HEADER.
     This is SEPARATE from Design > Custom CSS (see squarespace-custom-css.css).
     Both inject on every page; keep the logo size in sync between them (or
     manage it in only one place) so they don't fight.
     ===================================================================== -->

<script type="text/javascript" src="//ajax.googleapis.com/ajax/libs/jquery/1/jquery.min.js"></script>

<style>
/* Logo — force the size AND release Squarespace's cap on the <a> wrapper.
   site.css sets `.header-title-logo a { display:inline-block; max-height:35px }`
   (30px when shrunk). Since only the img was resized to 48px, the taller image
   overflowed BELOW the 35px inline-block anchor — that's what made the logo sit
   too low. Sizing the anchor to match (48px, display:block) makes the whole
   logo box 48px so it centers with the nav. */
.header-title-logo a {
  display: block !important;
  height: 48px !important;
  max-height: none !important;
}
.header-title-logo img {
  height: 48px !important;
  min-height: 48px !important;
  max-height: 48px !important;
  width: auto !important;
}

/* Header vertical padding (unchanged from the original injection) */
.header .header-title-nav-wrapper {
  padding-top: 0.5rem !important;
  padding-bottom: 0.5rem !important;
}
</style>
